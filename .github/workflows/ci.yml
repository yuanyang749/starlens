name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.task }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - lint
          - test
          - build
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint checks
        if: matrix.task == 'lint'
        run: |
          pnpm --filter @starlens/web lint
          pnpm --filter @starlens/mobile lint
      - name: Run automated tests
        if: matrix.task == 'test'
        run: |
          pnpm check:api-shims
          pnpm check:docs
          pnpm --filter @starlens/web test
          pnpm --filter @starlens/mobile test
          pnpm --filter @starlens/server test
          pnpm --filter @starlens/workbench test
          pnpm --filter @starlens-app/agent-tools test
          pnpm --filter @starlens-app/cli test
      - name: Build packages and applications
        if: matrix.task == 'build'
        run: |
          pnpm build:packages
          pnpm --filter @starlens/web build
          pnpm --filter @starlens/mobile build
